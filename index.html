<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunpla Stock Tracker</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ffcc00; }
        .filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { background: #333; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        button:hover, button.active { background: #ffcc00; color: #000; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #2a2a2a; border-radius: 8px; overflow: hidden; padding: 15px; text-align: center; }
        .card img { max-width: 100%; height: auto; border-radius: 4px; }
        .card h3 { font-size: 1rem; margin: 10px 0; }
        .grade-badge { display: inline-block; background: #ff4444; padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px;}
        .card a { display: inline-block; margin-top: 10px; padding: 8px 15px; background: #0088ff; color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>HLJ Gunpla Tracker</h1>
    
    <div class="filters" id="filters">
        <button class="active" onclick="filterData('All')">All</button>
        <button onclick="filterData('HG')">HG</button>
        <button onclick="filterData('RG')">RG</button>
        <button onclick="filterData('MG')">MG</button>
        <button onclick="filterData('PG')">PG</button>
        <button onclick="filterData('EG')">EG</button>
    </div>

    <div class="grid" id="container"></div>

    <script>
        let stockData = {};

        // Fetch the JSON generated by Python
        fetch('stock.json')
            .then(response => response.json())
            .then(data => {
                stockData = data;
                renderItems('All');
            });

        function filterData(grade) {
            // Update active button styling
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderItems(grade);
        }

        function renderItems(filterGrade) {
            const container = document.getElementById('container');
            container.innerHTML = '';

            Object.values(stockData).forEach(item => {
                if (filterGrade === 'All' || item.grade === filterGrade) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="grade-badge">${item.grade}</span>
                        <img src="${item.image}" alt="${item.name}">
                        <h3>${item.name}</h3>
                        <a href="${item.url}" target="_blank">Buy Now</a>
                    `;
                    container.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
